<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Triyani: The Experience</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Italianno&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
      /* --- 1. CORE & RESET --- */
      :root {
        --bg: #030303;
        --white: #ffffff;
        --grey: #888888;
        --accent: #ff2e63; /* Neon Pink */
        --cyan: #08d9d6; /* Neon Cyan */
        --ease: cubic-bezier(0.19, 1, 0.22, 1); /* Expo Ease */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none; /* Hide default cursor */
      }

      body {
        background-color: var(--bg);
        color: var(--white);
        font-family: "Inter", sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* --- 2. CUSTOM CURSOR --- */
      #cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border: 1px solid var(--white);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition:
          width 0.3s,
          height 0.3s,
          background 0.3s;
        mix-blend-mode: difference;
      }
      #cursor.hovered {
        width: 50px;
        height: 50px;
        background: var(--white);
        opacity: 0.5;
        border: none;
      }

      /* --- 3. BACKGROUND NOISE & GRADIENT --- */
      .noise {
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.07;
        background: url("https://grainy-gradients.vercel.app/noise.svg");
        pointer-events: none;
      }
      .gradient-orb {
        position: fixed;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.2;
        z-index: -2;
        animation: orbFloat 10s infinite alternate;
      }
      .orb-1 {
        top: -100px;
        left: -100px;
        background: var(--accent);
      }
      .orb-2 {
        bottom: -100px;
        right: -100px;
        background: var(--cyan);
      }

      @keyframes orbFloat {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(50px, 50px);
        }
      }

      /* --- 4. INTRO SCENE --- */
      #intro {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: transform 1s var(--ease);
      }
      #intro.hidden {
        transform: translateY(-100%);
      }

      .enter-btn {
        font-family: "Syne", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: transparent;
        -webkit-text-stroke: 1px var(--white);
        background: none;
        border: none;
        letter-spacing: 5px;
        text-transform: uppercase;
        padding: 20px 40px;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
      }
      .enter-btn::before {
        content: "ENTER SPACE";
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        height: 100%;
        color: var(--bg);
        background: var(--white);
        overflow: hidden;
        transition: 0.5s var(--ease);
        display: flex;
        align-items: center;
        white-space: nowrap;
        padding-left: 40px;
      }
      .enter-btn:hover::before {
        width: 100%;
      }

      .loading-line {
        width: 1px;
        height: 100px;
        background: var(--grey);
        margin-bottom: 20px;
        animation: growLine 1.5s var(--ease) forwards;
      }
      @keyframes growLine {
        from {
          height: 0;
        }
        to {
          height: 100px;
        }
      }

      /* --- 5. MAIN CONTENT (SLIDER) --- */
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transform: scale(1.1);
        transition: 1s var(--ease);
      }
      .slide.active {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      /* -- SLIDE 1: HERO (PARALLAX) -- */
      .hero-title {
        font-family: "Syne", sans-serif;
        font-size: 10vw;
        line-height: 0.8;
        font-weight: 800;
        text-align: center;
        text-transform: uppercase;
        color: var(--white);
        position: relative;
        z-index: 1;
        mix-blend-mode: overlay;
      }
      .hero-img-container {
        position: absolute;
        width: 350px;
        height: 450px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
        overflow: hidden;
      }
      .hero-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(100%) contrast(120%);
        transition: 0.5s;
      }
      .hero-img-container:hover .hero-img {
        filter: grayscale(0%);
        transform: scale(1.1);
      }

      .floating-date {
        position: absolute;
        bottom: 10%;
        right: 10%;
        font-family: "Italianno", cursive;
        font-size: 3rem;
        color: var(--accent);
        transform: rotate(-10deg);
      }

      /* -- SLIDE 2: 3D CAROUSEL -- */
      .carousel-scene {
        perspective: 1000px;
        width: 100%;
        height: 60%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .carousel {
        width: 250px;
        height: 350px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s;
      }
      .carousel-item {
        position: absolute;
        width: 250px;
        height: 350px;
        background: #fff;
        border: 5px solid white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        color: black;
        overflow: hidden;
        /* Positioning is handled by JS */
      }
      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .carousel-nav {
        margin-top: 50px;
        display: flex;
        gap: 20px;
        z-index: 10;
      }
      .c-btn {
        background: transparent;
        border: 1px solid var(--white);
        color: var(--white);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
      }
      .c-btn:hover {
        background: var(--white);
        color: var(--bg);
      }

      /* -- SLIDE 3: MUSIC -- */
      .music-wrapper {
        text-align: center;
        position: relative;
      }
      .vinyl-record {
        width: 300px;
        height: 300px;
        background: #111;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 30px;
        position: relative;
        box-shadow: 0 0 50px rgba(255, 46, 99, 0.2);
      }
      .vinyl-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        animation: spin 8s linear infinite;
        animation-play-state: paused;
      }
      .visualizer-ring {
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        border: 1px solid var(--accent);
        opacity: 0;
        transform: scale(0.8);
      }
      .playing .visualizer-ring {
        animation: pulseRing 2s infinite;
        opacity: 1;
      }
      .playing .vinyl-img {
        animation-play-state: running;
      }

      .song-title {
        font-family: "Syne", sans-serif;
        font-size: 2rem;
        margin-bottom: 5px;
      }
      .play-trigger {
        font-family: "Inter", sans-serif;
        letter-spacing: 2px;
        font-size: 0.8rem;
        border-bottom: 1px solid var(--white);
        padding-bottom: 5px;
      }

      /* -- SLIDE 4: MESSAGE -- */
      .message-box {
        max-width: 600px;
        text-align: center;
        padding: 20px;
      }
      .big-quote {
        font-family: "Syne", sans-serif;
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 30px;
      }
      .body-text {
        font-size: 1.1rem;
        color: var(--grey);
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .highlight {
        color: var(--accent);
      }

      /* --- 6. NAVIGATION (MINIMAL DOTS) --- */
      .nav-dots {
        position: fixed;
        right: 40px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 50;
      }
      .dot {
        width: 6px;
        height: 6px;
        background: var(--grey);
        border-radius: 50%;
        transition: 0.3s;
        position: relative;
      }
      .dot::after {
        content: "";
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border: 1px solid transparent;
        border-radius: 50%;
        transition: 0.3s;
      }
      .dot.active {
        background: var(--white);
        transform: scale(1.5);
      }
      .dot.active::after {
        border-color: var(--white);
        transform: scale(1.5);
      }

      /* --- ANIMATIONS --- */
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes pulseRing {
        0% {
          transform: scale(0.8);
          opacity: 1;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }

      /* Mobile Adjustments */
      @media (max-width: 768px) {
        .hero-title {
          font-size: 15vw;
        }
        .hero-img-container {
          width: 250px;
          height: 350px;
        }
        .nav-dots {
          right: 20px;
        }
        .carousel {
          width: 200px;
          height: 300px;
        }
        #cursor {
          display: none;
        } /* Hide custom cursor on mobile */
        * {
          cursor: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div class="noise"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <audio id="audio" loop><source src="lagu.mp3" type="audio/mp3" /></audio>

    <div id="intro">
      <div class="loading-line"></div>
      <button
        class="enter-btn"
        onmouseenter="hoverCursor()"
        onmouseleave="unhoverCursor()"
        onclick="enterSpace()"
      >
        ENTER SPACE
      </button>
    </div>

    <div id="app">
      <div class="slide active" id="s1">
        <div class="hero-img-container" id="heroImg">
          <img
            src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1887&auto=format&fit=crop"
            class="hero-img"
          />
        </div>
        <h1 class="hero-title">TRIYANI<br />PUTRI</h1>
        <div class="floating-date">14th Feb</div>
      </div>

      <div class="slide" id="s2">
        <h2
          style="
            font-family: &quot;Syne&quot;;
            margin-bottom: 40px;
            letter-spacing: 2px;
          "
        >
          MEMORIES
        </h2>
        <div class="carousel-scene">
          <div class="carousel" id="carousel">
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1516575334481-f85287c2c81d?q=80&w=1887&auto=format&fit=crop"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=1887&auto=format&fit=crop"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1887&auto=format&fit=crop"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1887&auto=format&fit=crop"
              />
            </div>
          </div>
        </div>
        <div class="carousel-nav">
          <button
            class="c-btn"
            onclick="rotateCarousel(-1)"
            onmouseenter="hoverCursor()"
            onmouseleave="unhoverCursor()"
          >
            <i class="fas fa-chevron-left"></i>
          </button>
          <button
            class="c-btn"
            onclick="rotateCarousel(1)"
            onmouseenter="hoverCursor()"
            onmouseleave="unhoverCursor()"
          >
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>

      <div class="slide" id="s3">
        <div class="music-wrapper">
          <div
            class="vinyl-record"
            id="vinylContainer"
            onclick="toggleMusic()"
            onmouseenter="hoverCursor()"
            onmouseleave="unhoverCursor()"
          >
            <div class="visualizer-ring"></div>
            <div class="visualizer-ring" style="animation-delay: 0.5s"></div>
            <img
              src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=2070&auto=format&fit=crop"
              class="vinyl-img"
              id="vinylImg"
            />
          </div>
          <div class="song-title">Our Soundtrack</div>
          <div class="play-trigger" id="playText">CLICK DISC TO PLAY</div>
        </div>
      </div>

      <div class="slide" id="s4">
        <div class="message-box">
          <div class="big-quote">
            "YOU ARE MY<br /><span style="color: var(--accent)">UNIVERSE</span>"
          </div>
          <p class="body-text">
            Selamat ulang tahun, Triyani. Di tengah milyaran bintang, kamu
            adalah satu-satunya yang paling bersinar di mataku. Terima kasih
            sudah ada.
            <br /><br />
            <i>Happy Valentine's Day.</i>
          </p>
          <button
            class="enter-btn"
            style="font-size: 1rem; padding: 10px 30px"
            onclick="replay()"
            onmouseenter="hoverCursor()"
            onmouseleave="unhoverCursor()"
          >
            REPLAY
          </button>
        </div>
      </div>
    </div>

    <div class="nav-dots">
      <div
        class="dot active"
        onclick="goToSlide(0)"
        onmouseenter="hoverCursor()"
        onmouseleave="unhoverCursor()"
      ></div>
      <div
        class="dot"
        onclick="goToSlide(1)"
        onmouseenter="hoverCursor()"
        onmouseleave="unhoverCursor()"
      ></div>
      <div
        class="dot"
        onclick="goToSlide(2)"
        onmouseenter="hoverCursor()"
        onmouseleave="unhoverCursor()"
      ></div>
      <div
        class="dot"
        onclick="goToSlide(3)"
        onmouseenter="hoverCursor()"
        onmouseleave="unhoverCursor()"
      ></div>
    </div>

    <script>
      // --- 1. CURSOR LOGIC ---
      const cursor = document.getElementById("cursor");
      document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";

        // Parallax Effect on Hero
        const heroImg = document.getElementById("heroImg");
        if (heroImg) {
          const x = (window.innerWidth - e.pageX * 2) / 50;
          const y = (window.innerHeight - e.pageY * 2) / 50;
          heroImg.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
        }
      });

      function hoverCursor() {
        cursor.classList.add("hovered");
      }
      function unhoverCursor() {
        cursor.classList.remove("hovered");
      }

      // --- 2. NAVIGATION LOGIC ---
      const slides = document.querySelectorAll(".slide");
      const dots = document.querySelectorAll(".dot");
      let currentSlide = 0;

      function goToSlide(index) {
        slides[currentSlide].classList.remove("active");
        dots[currentSlide].classList.remove("active");

        currentSlide = index;

        slides[currentSlide].classList.add("active");
        dots[currentSlide].classList.add("active");
      }

      // --- 3. INTRO LOGIC ---
      function enterSpace() {
        document.getElementById("intro").classList.add("hidden");

        // Confetti
        confetti({
          particleCount: 150,
          spread: 100,
          origin: { y: 0.6 },
          colors: ["#ff2e63", "#08d9d6"],
        });

        // Try Autoplay
        const audio = document.getElementById("audio");
        audio
          .play()
          .then(() => {
            isPlaying = true;
            updateMusicUI();
          })
          .catch((e) => console.log("Audio waiting"));
      }

      function replay() {
        location.reload();
      }

      // --- 4. 3D CAROUSEL LOGIC ---
      const carousel = document.getElementById("carousel");
      const items = document.querySelectorAll(".carousel-item");
      const radius = 250; // Jarak dari pusat
      let angle = 0;

      function setupCarousel() {
        const theta = 360 / items.length;
        items.forEach((item, index) => {
          item.style.transform = `rotateY(${index * theta}deg) translateZ(${radius}px)`;
        });
      }
      setupCarousel();

      function rotateCarousel(direction) {
        const theta = 360 / items.length;
        angle += direction * theta;
        carousel.style.transform = `translateZ(-${radius}px) rotateY(${angle}deg)`;
      }

      // --- 5. MUSIC LOGIC ---
      let isPlaying = false;
      const audio = document.getElementById("audio");
      const vinylContainer = document.getElementById("vinylContainer");
      const vinylImg = document.getElementById("vinylImg");
      const playText = document.getElementById("playText");

      function toggleMusic() {
        if (isPlaying) {
          audio.pause();
          playText.innerText = "CLICK DISC TO PLAY";
        } else {
          audio.play();
          playText.innerText = "NOW PLAYING";
        }
        isPlaying = !isPlaying;
        updateMusicUI();
      }

      function updateMusicUI() {
        if (isPlaying) {
          vinylContainer.classList.add("playing");
          vinylImg.style.animationPlayState = "running";
        } else {
          vinylContainer.classList.remove("playing");
          vinylImg.style.animationPlayState = "paused";
        }
      }
    </script>
  </body>
</html>
